version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: distributed-job-scheduler-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-job_scheduler}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-job_scheduler}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  backend-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: distributed-job-scheduler-backend
    env_file:
      - backend-api/.env.example
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/job_scheduler}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  worker-service:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    container_name: distributed-job-scheduler-worker
    env_file:
      - worker-service/.env.example
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/job_scheduler}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: distributed-job-scheduler-frontend
    env_file:
      - frontend/.env.example
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      backend-api:
        condition: service_started
    networks:
      - app-network

volumes:
  postgres-data:
    driver: local

networks:
  app-network:
    driver: bridge
